name: pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "skills/**"
      - "demo.gif"
      - "demo.webm"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - name: assemble site
        run: |
          mkdir -p _site
          cp -R site/* _site/
          mkdir -p _site/skill
          cp -R skills/loby/* _site/skill/
          # VHS-generated demo assets live at the repo root so the README
          # can embed them via the GitHub raw URL; copy them into the site
          # so /demo.gif and /demo.webm resolve at lobycli.com too.
          cp demo.gif demo.webm _site/
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v5
