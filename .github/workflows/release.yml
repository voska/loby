name: release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: tag to release (e.g. v1.0.0)
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - uses: sigstore/cosign-installer@v4.1.2
        with:
          # cosign v3 changed sign-blob output to a bundle by default, breaking
          # goreleaser's --output-signature pattern. Pinning to v2.x until the
          # goreleaser cosign template ships v3-compatible defaults.
          cosign-release: v2.6.3
      - uses: anchore/sbom-action/download-syft@v0
      - name: import gpg key
        if: env.GPG_PRIVATE_KEY != ''
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "GPG_FINGERPRINT=$(gpg --list-keys --with-colons | awk -F: '/^pub:/ {getline; print $10; exit}')" >> "$GITHUB_ENV"
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Single PAT scoped to push to both voska/homebrew-tap and voska/scoop-bucket.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GPG_FINGERPRINT: ${{ env.GPG_FINGERPRINT }}
      - name: attest binary provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/loby_*"
